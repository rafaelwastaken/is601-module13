<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="auth-card">
      <h1>Create account</h1>
      <p class="subtitle">register with your email and password</p>
      <form data-mode="register" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required />
        </div>

        <div class="field">
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required />
        </div>

        <p class="helper">password must be at least 8 characters long</p>
        <button type="submit">Register</button>
      </form>

      <p id="message" class="message" role="status" aria-live="polite"></p>
      <p id="token" class="token"></p>
      <div class="nav"><a href="/login.html">already have an account? login</a></div>
    </main>
    <script src="/static/auth.js"></script>
  </body>
</html>
